name: Build AgriMarket APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev \
          build-essential ccache

    - name: Install buildozer and dependencies
      run: |
        pip install buildozer==1.5.0 cython==0.29.36

    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-v3-${{ hashFiles('buildozer.spec') }}

    - name: Pre-install Android SDK cmdline-tools
      run: |
        # Download and set up Android cmdline-tools manually
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools latest
        rm commandlinetools-linux-9477386_latest.zip

        # Accept all licenses
        yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses || true

        # Install required SDK components
        ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
          --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
          "platform-tools" \
          "build-tools;33.0.2" \
          "platforms;android-33"

        # Create tools/bin/sdkmanager symlink for buildozer compatibility
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        ln -sf ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
               ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

    - name: Accept SDK licenses files
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        printf "84831b9409646a918e30573bab4c9c91346d8abd" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build APK
      run: buildozer -v android debug

    - name: Find APK
      run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AgriMarket-APK
        path: bin/*.apk
        retention-days: 30
