name: Build AgriMarket APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev \
          build-essential ccache

    - name: Set JAVA_HOME to 17
      run: |
        echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV

    - name: Install buildozer
      run: pip install buildozer==1.5.0 cython==0.29.36

    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-v5-${{ hashFiles('buildozer.spec') }}

    - name: Set ANDROID_SDK_ROOT and accept licenses
      run: |
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

        # Download cmdline-tools
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
        cp -r cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

        # Create legacy tools/bin path that buildozer expects
        mkdir -p $ANDROID_SDK_ROOT/tools/bin
        ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
               $ANDROID_SDK_ROOT/tools/bin/sdkmanager
        ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager \
               $ANDROID_SDK_ROOT/tools/bin/avdmanager

        # Accept all licenses
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          --sdk_root=$ANDROID_SDK_ROOT --licenses || true

        # Install required packages
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          --sdk_root=$ANDROID_SDK_ROOT \
          "platform-tools" \
          "build-tools;33.0.2" \
          "platforms;android-33" \
          "extras;android;m2repository" \
          "extras;google;m2repository"

        # Write license files manually as backup
        mkdir -p $ANDROID_SDK_ROOT/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
          > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" \
          > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license

    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        buildozer -v android debug 2>&1

    - name: Find and list APK
      run: find . -name "*.apk" 2>/dev/null && echo "APK found!" || echo "No APK"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AgriMarket-APK
        path: bin/*.apk
        retention-days: 30
